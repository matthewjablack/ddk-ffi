name: ddk-ts CI

on:
  push:
    branches: [master]
  pull_request:
    branches: ["*"]

jobs:
  build-darwin-arm64:
    name: Build Darwin ARM64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ddk-ts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        run: |
          cd ddk-ts
          pnpm install --no-frozen-lockfile

      - name: Build for Darwin ARM64
        run: |
          cd ddk-ts
          pnpm build:darwin-arm64

      - name: Verify Build Output
        run: |
          if [ ! -f "ddk-ts/dist/index.js" ]; then
            echo "Error: index.js not generated"
            exit 1
          fi
          if [ ! -f "ddk-ts/dist/index.d.ts" ]; then
            echo "Error: index.d.ts not generated"
            exit 1
          fi
          echo "✅ Darwin ARM64 build successful"

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ddk-ts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        run: |
          cd ddk-ts
          pnpm install --no-frozen-lockfile

      - name: Build for Linux x64
        run: |
          cd ddk-ts
          pnpm build:linux-x64

      - name: Verify Build Output
        run: |
          if [ ! -f "ddk-ts/dist/index.js" ]; then
            tree -L 2
            echo "Error: index.js not generated"
            exit 1
          fi
          if [ ! -f "ddk-ts/dist/index.d.ts" ]; then
            tree -L 2
            echo "Error: index.d.ts not generated"
            exit 1
          fi
          echo "✅ Linux x64 build successful"

  build-wasm:
    name: Build WASM (wasm32-wasip1-threads)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1-threads

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup WASI SDK
        run: |
          curl -sL -o /tmp/wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-33.0-x86_64-linux.tar.gz
          sudo mkdir -p /opt/wasi-sdk
          sudo tar xzf /tmp/wasi-sdk.tar.gz -C /opt/wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=/opt/wasi-sdk" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ddk-ts/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        run: |
          cd ddk-ts
          pnpm install --no-frozen-lockfile

      - name: Build for WASM
        run: |
          cd ddk-ts
          pnpm build:wasm

      - name: Verify Build Output
        run: |
          if [ ! -f "ddk-ts/dist/ddk-ts.wasm32-wasi.wasm" ]; then
            echo "Error: ddk-ts.wasm32-wasi.wasm not generated"
            exit 1
          fi
          echo "✅ WASM build successful"

  test-typescript:
    name: Test TypeScript Package
    runs-on: ubuntu-latest
    needs: [build-darwin-arm64, build-linux-x64, build-wasm]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ddk-ts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Dependencies
        run: |
          cd ddk-ts
          pnpm install --no-frozen-lockfile

      - name: Build for Tests
        run: |
          cd ddk-ts
          pnpm build

      - name: Run Tests
        run: |
          cd ddk-ts
          pnpm test

      - name: Verify Parity
        run: |
          cd ddk-ts
          pnpm verify:parity

      - name: Verify Types
        run: |
          cd ddk-ts
          pnpm verify:types
